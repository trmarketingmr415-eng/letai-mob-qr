<!DOCTYPE html>
<html lang="ru">
<head>

  <title>Скачать Летай 2.0</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px 30px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 20px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: #fff;
    }
    h1 {
      font-size: 26px;
      color: #1a1a1a;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #666;
      font-size: 15px;
      margin-bottom: 30px;
      line-height: 1.5;
    }
    .store-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px 20px;
      margin-bottom: 12px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.25s ease;
      border: 2px solid transparent;
    }
    .store-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    .store-btn svg {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
    }
    .google-play {
      background: #fff;
      color: #1a1a1a;
      border-color: #e0e0e0;
    }
    .app-store {
      background: #000;
      color: #fff;
    }
    .app-gallery {
      background: #fff;
      color: #cf0a2c;
      border-color: #cf0a2c;
    }
    .rustore {
      background: linear-gradient(135deg, #0077ff, #00c3ff);
      color: #fff;
    }
    .loader {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(102,126,234,0.3);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .redirect-msg {
      color: #667eea;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Google Play -->

      <svg viewBox="0 0 512 512" fill="none">

        <path d="M359.7 330.8L280.4 251.5 47.6 484.3c8.6 9.2 22.9 10.3 39 1.1l273.1-154.6" fill="#ff3d44"/>

      </svg>
      Google Play
    </a>

    <!-- App Store -->
    <a class="store-btn app-store" href="https://apps.apple.com/ru/app/летай-2-0/id1574494891">
      <svg viewBox="0 0 384 512" fill="currentColor">
        <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
      </svg>
      App Store

    <!-- AppGallery -->
    <a class="store-btn app-gallery" href="https://appgallery.huawei.ru/app/C105849211">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>

        <path d="M4 4h11a5 5 0 0 1 5 5 5 5 0 0 1-5 5H9v6H4V4zm5 5h5a1 1 0 0 0 0-2H9v2z"/>
      </svg>
      RuStore
    </a>
  </div>

  <script>
    var ua = navigator.userAgent || "";

    // Показать сообщение о переадресации только на мобильных
    function showRedirect() {
      document.getElementById('redirectMsg').style.display = 'block';
    }

    if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
      // iOS → App Store
      showRedirect();
      window.location.href = "https://apps.apple.com/ru/app/летай-2-0/id1574494891";
    } else if (/android/i.test(ua)) {
      if (/huawei|honor/i.test(ua)) {
        // Huawei → AppGallery
        showRedirect();
        window.location = "appmarket://details?id=C105849211";
        setTimeout(function() {
          window.location = "https://appgallery.huawei.ru/app/C105849211";
        }, 1500);
      } else {
        // Прочие Android → Google Play
        showRedirect();
        window.location = "market://details?id=lc.deck.tattelecom";
        setTimeout(function() {
          window.location = "https://play.google.com/store/apps/details?id=lc.deck.tattelecom";
        }, 1500);
      }
    }
    // Десктоп — просто показываем красивые кнопки, без переадресации
  </script>

</html>
