<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Скачать приложение Летай</title>
  <!-- Шрифт PT Root UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.cdnfonts.com/css/pt-root-ui" rel="stylesheet">
  <style>
    :root {
      --letai-orange: #FE5000;
      --letai-white: #FFFFFF;
      --letai-black: #000000;
      --letai-blue: #0078E6;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'PT Root UI', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--letai-orange);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    /* Графический элемент «Плэй» на фоне (по брендбуку) */
    body::before {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      background: rgba(255,255,255,0.08);
      border-radius: 50% 50% 50% 0;
      top: -150px;
      right: -150px;
      transform: rotate(45deg);
    }
    body::after {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(255,255,255,0.06);
      border-radius: 50% 50% 50% 0;
      bottom: -120px;
      left: -120px;
      transform: rotate(45deg);
    }
    .card {
      background: var(--letai-white);
      border-radius: 28px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.25);
      padding: 44px 32px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 2;
    }
    .brand-logo {
      max-width: 160px;
      height: auto;
      margin: 0 auto 24px;
      display: block;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--letai-black);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .slogan {
      color: var(--letai-orange);
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #666;
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .store-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 15px 20px;
      margin-bottom: 12px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.25s ease;
      border: 2px solid #eee;
      background: #fff;
      color: var(--letai-black);
    }
    .store-btn:hover {
      transform: translateY(-3px);
      border-color: var(--letai-orange);
      box-shadow: 0 8px 22px rgba(254,80,0,0.18);
    }
    .store-btn:last-of-type {
      margin-bottom: 0;
    }
    .store-btn img,
    .store-btn svg {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      object-fit: contain;
    }
    .redirect-msg {
      color: var(--letai-orange);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 20px;
      display: none;
    }
    .loader {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(254,80,0,0.3);
      border-top-color: var(--letai-orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #aaa;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Логотип Летай -->
    <img class="brand-logo" src="logo.png" alt="Летай">

    <p class="slogan">Сервисы для жизни</p>
    <h1>Скачайте приложение</h1>
    <p class="subtitle">Выберите магазин для загрузки</p>

    <p class="redirect-msg" id="redirectMsg">
      <span class="loader"></span>Открываем магазин…
    </p>

    <!-- Google Play -->
    <a class="store-btn" href="https://play.google.com/store/apps/details?id=lc.deck.tattelecom">
      <svg viewBox="0 0 512 512" fill="none">
        <path d="M47.6 26.9c-4.7 5-7.4 12.7-7.4 22.7v413c0 10 2.7 17.7 7.4 22.7l1.4 1.3 231.4-231.4v-5.5L48.9 25.5l-1.3 1.4z" fill="#00d3ff"/>
        <path d="M357.9 331.7L280.4 254.2v-5.5l77.5-77.5 1.8 1 91.8 52.2c26.2 14.9 26.2 39.3 0 54.2l-91.8 52.2-1.8.9z" fill="#ffce00"/>
        <path d="M359.7 330.8L280.4 251.5 47.6 484.3c8.6 9.2 22.9 10.3 39 1.1l273.1-154.6" fill="#ff3d44"/>
        <path d="M359.7 172.2L86.6 17.6c-16.1-9.2-30.4-8.1-39 1.1l232.8 232.8 79.3-79.3z" fill="#00f076"/>
      </svg>
      Google Play
    </a>

    <!-- App Store -->
    <a class="store-btn" href="https://apps.apple.com/ru/app/летай-2-0/id1574494891">
      <svg viewBox="0 0 384 512" fill="#000">
        <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
      </svg>
      App Store
    </a>

    <!-- AppGallery -->
    <a class="store-btn" href="https://appgallery.huawei.ru/app/C105849211">
      <img src="huawei.png" alt="AppGallery">
      AppGallery
    </a>

    <!-- RuStore -->
    <a class="store-btn" href="https://www.rustore.ru/catalog/app/lc.deck.tattelecom">
      <img src="rustore.png" alt="RuStore">
      RuStore
    </a>

    <p class="footer">© Летай · ПАО «Таттелеком»</p>
  </div>

  <script>
    var ua = navigator.userAgent || "";

    function showRedirect() {
      document.getElementById('redirectMsg').style.display = 'block';
    }

    if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
      // iOS → App Store
      showRedirect();
      window.location.href = "https://apps.apple.com/ru/app/летай-2-0/id1574494891";
    } else if (/android/i.test(ua)) {
      if (/huawei|honor/i.test(ua)) {
        // Huawei → AppGallery
        showRedirect();
        window.location = "appmarket://details?id=C105849211";
        setTimeout(function() {
          window.location = "https://appgallery.huawei.ru/app/C105849211";
        }, 1500);
      } else {
        // Прочие Android → Google Play
        showRedirect();
        window.location = "market://details?id=lc.deck.tattelecom";
        setTimeout(function() {
          window.location = "https://play.google.com/store/apps/details?id=lc.deck.tattelecom";
        }, 1500);
      }
    }
    // Десктоп — просто красивые кнопки
  </script>
</body>
</html>
